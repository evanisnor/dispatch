plan_storage:
  repo_path: ~/plans

git:
  protected_branches:
    - main
    - master
  main_update_strategy: rebase  # rebase (default) or merge-ff-only

issue_tracking:
  tool: jira
  read_only: false
  prompt: ""  # optional: prompt (or "/skill-name") for all tracker operations

sandbox:
  network:
    allowed_domains:
      - github.com
      - api.github.com
      - registry.npmjs.org
  filesystem:
    extra_deny_read: []

diff:
  mode: split

editor:
  app: ""  # App display name or CLI command for opening worktrees during review.
           # macOS: use the app's display name (e.g. "Cursor", "Xcode", "Visual Studio Code").
           # Any platform: use the CLI command name if the editor installs one (e.g. "code", "cursor").
           # Leave empty to disable the editor open option.

pr:
  template_path: ""
  description_prompt: ""  # optional: prompt (or "/skill-name") for PR body authoring

verification:
  manual_gate: false
  startup_command: ""
  prompt: ""  # optional: prompt (or "/skill-name") for automated pre-PR verification

code_review:
  prompt: ""  # optional: prompt (or "/skill-name") for preliminary PR analysis

knowledge:
  repo_path: ""  # optional: path to knowledge repo; defaults to plan_storage.repo_path
  max_load_entries: 30  # cap on entries loaded per session

prototype:
  auto_push: false  # true = always push to origin; false (default) = ask

defaults:
  max_ci_fix_attempts: 3
  max_agent_restarts: 2
  polling_timeout_minutes: 60
  polling_interval_minutes: 15
