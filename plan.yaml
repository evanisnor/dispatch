      Usage: open-in-editor.sh <worktree-path>

      The script should: 1. Source config.sh to read EDITOR_APP. 2. Validate that <worktree-path> argument is provided and exists. 3. Exit 1 with a clear error if EDITOR_APP is empty. 4. Try the value as a CLI command first: if command -v "$EDITOR_APP" succeeds, run









         "$EDITOR_APP" "$WORKTREE_PATH" and exit 0.
      5. On macOS (uname == Darwin), try: open -a "$EDITOR_APP" "$WORKTREE_PATH" and exit 0 on success. 6. Exit 1 with a message: "editor '$EDITOR_APP' not found as a command or macOS app".

  - id: 85
