  - id: 26
    name: plan-amendment
    status: done
    depends_on: [9, 12]
    description: >
      Define how the Orchestrating Agent handles mid-flight plan changes: adding new tasks, splitting an existing task, or cancelling tasks after work has started.

      Changes required:






































        skills/orchestrating-agents/SKILL.md:
          - Add a "Plan Amendment" section.
          - Three amendment types, each requiring human approval before acting:

              Add task:
                1. Human requests a new task be added ("add a task to do X").
                2. Orchestrating Agent asks for approval to spawn a Planning Agent in
                   amendment mode, passing the existing plan path and the requested addition.
                3. Planning Agent proposes the new task(s) with correct depends_on wiring
                   relative to existing tasks. Human approves.
                4. Orchestrating Agent saves the amended plan via save-plan.sh.
                5. New task enters the normal execution queue.

              Split task:
                1. Human identifies a task to split ("task T-3 is too large, split it").
                2. If the task is in_progress: Orchestrating Agent asks whether to wait for
                   it to finish or cancel it before splitting.
                3. Planning Agent proposes replacement tasks with equivalent depends_on.
                   Human approves.
                4. Original task marked cancelled; replacement tasks added to the plan.

              Cancel task:
                1. Human requests cancellation ("cancel task T-5").
                2. Orchestrating Agent identifies all tasks that depend on it (directly or
                   transitively) and presents the blast radius to the human before acting.
                3. On confirmation: mark the task cancelled, mark all dependents blocked,
                   notify relevant Task Agents.
                4. Human decides whether to re-plan the blocked dependents or leave them.

        skills/planning-tasks/SKILL.md:
          - Add an "Amendment Mode" section.
          - When spawned with an existing plan path and an amendment request, the Planning
            Agent reads the current plan, proposes only the change (not a full re-plan),
            validates the modified dependency graph, and returns the amended plan for human
            approval.
  - id: 27
    name: agent-liveness-checks
    status: done
    depends_on: [9]
    description: >
      Add periodic liveness checks to the Orchestrating Agent's monitoring loop so that silently dead Task Agents are detected during a session rather than only on restart.

      Changes required:






































        skills/orchestrating-agents/scripts/check-agent-liveness.sh (new script):
          - Accepts: agent_id, last_activity_timestamp (ISO 8601), stall_timeout_minutes.
          - Reads POLLING_TIMEOUT_MINUTES from config.sh as the default stall timeout if
            stall_timeout_minutes is not provided.
          - Queries the Claude Agent SDK for agent status (running / stopped / error).
          - If the agent is stopped or errored: exit 1 (dead).
          - If the agent is running but last_activity_timestamp is older than
            stall_timeout_minutes: exit 2 (stalled — running but not producing output).
          - If the agent is running and recently active: exit 0 (healthy).

        skills/orchestrating-agents/PR_MONITORING.md:
          - Add a "Liveness Check" section.
          - During the PR monitoring loop, after each polling cycle, call
            check-agent-liveness.sh for each in_progress Task Agent.
          - On exit 1 (dead): escalate to human immediately with agent_id, task_id, and
            last known activity. Offer to restart the agent (up to MAX_AGENT_RESTARTS) or
            abandon the task.
          - On exit 2 (stalled): notify human that the agent appears stalled. Offer to
            wait another polling cycle, restart, or abandon.
          - On restart: call spawn-agent.sh with the same task_id and plan_path. Update
            agent_id in the plan via save-plan.sh.
