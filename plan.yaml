      Update skills/orchestrating-agents/REVIEW.md to support opening the worktree in an editor during diff review.

      Add a new "Open in Editor" section after the "Diff Mode Toggle" section and before the "Initial Diff Review Loop" section:










        ## Open in Editor

        At any point during a diff review, if EDITOR_APP is configured, the human can respond
        with "open editor". When this happens:
        1. Call open-in-editor.sh "<worktree-path>".
        2. Confirm to the human: "Worktree opened in <EDITOR_APP>."
        3. Continue the review loop from the same step — the diff window stays open.

      In the Initial Diff Review Loop step 3, append to the human prompt (only if EDITOR_APP is set): 'Type "open editor" to open the worktree in <EDITOR_APP>.'

      Apply the same inline offer in the Reviewer-Requested Change Review Loop step 5b and in the Merge Conflict Review Loop step 3a — anywhere open-review-pane.sh is called and the human is asked to review a diff.

