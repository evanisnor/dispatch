        export EDITOR_APP
        EDITOR_APP="$(_cfg '.editor.app' '.defaults.editor_app' '')"

      In settings.yaml, add to the defaults section:









        editor_app: ""

      In .dispatch.example.yaml, add a new top-level editor section after the diff section:









        editor:
          app: ""  # App display name or CLI command for opening worktrees during review.
                   # macOS: use the app's display name (e.g. "Cursor", "Xcode", "Visual Studio Code").
                   # Any platform: use the CLI command name if the editor installs one (e.g. "code", "cursor").
                   # Leave empty to disable the editor open option.
  - id: 84
