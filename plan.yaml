      does not correctly match all commands. The correct pattern for "allow all
      bash commands" is just Bash (no parens). Replace Bash(**) with Bash in
      skills/config/SKILL.md (step 8 JSON, step 9b check list, step 9c
      conflict check prose) and README.md (project-level JSON, global JSON,
      deny rule note). File-path tools like Write(**) and Edit(**) are correct
